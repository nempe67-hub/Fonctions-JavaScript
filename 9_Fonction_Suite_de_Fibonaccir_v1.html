<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite de Fibonacci</title>
    <style>
        /* Style global et image d'arrière-plan */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Image de fond de Leonardo de Pise via Wikimedia */
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), 
                        url('https://wikimedia.org') no-repeat center center fixed;
            background-size: cover;
        }

        /* Conteneur principal */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Style du formulaire */
        .form-fibonacci {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Zone de saisie */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
        }

        input[type="number"] {
            width: 90%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #3498db;
        }

        /* Boutons */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            flex: 1;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: #2ecc71;
            color: white;
        }

        .btn-calc:hover {
            background-color: #27ae60;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Zone de résultat */
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            word-wrap: break-word;
            font-weight: 500;
            color: #2c3e50;
        }

        /* Pied de page avec texte défilant */
        footer {
            background-color: #2c3e50;
            color: #ffffff;
            overflow: hidden;
            white-space: nowrap;
            padding: 12px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }

        .marquee {
            display: inline-block;
            padding-left: 100%;
            animation: scroll-text 25s linear infinite;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        @keyframes scroll-text {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-fibonacci">
            <h1>Suite de Fibonacci</h1>
            
            <div class="input-group">
                <label for="terms">Nombre de termes à générer :</label>
                <input type="number" id="terms" min="1" placeholder="Ex: 10">
            </div>

            <div class="btn-group">
                <button type="button" class="btn-calc" onclick="afficherFibonacci()">Calculer</button>
                <button type="button" class="btn-clear" onclick="effacerFormulaire()">Effacer</button>
            </div>

            <div id="resultat" class="result-box" style="display: none;"></div>
        </div>
    </div>

    <footer>
        <div class="marquee">
            Projet JavaScript 2: Fonction Suite de Fibonacci.    ---    Conception - Juin 2026    ---    NEMPE MOBIO SYLVAIN, Etudiant en Web Developpement à GomyCode.
        </div>
    </footer>

    <script>
        // Fonction principale pour générer la suite de Fibonacci
        function genererFibonacci(n) {
            let suite = [];
            if (n <= 0) return suite;
            
            suite.push(0);
            if (n === 1) return suite;
            
            suite.push(1);
            for (let i = 2; i < n; i++) {
                suite.push(suite[i - 1] + suite[i - 2]);
            }
            return suite;
        }

        // Fonction liée au bouton de calcul
        function afficherFibonacci() {
            const inputNb = document.getElementById('terms').value;
            const divResultat = document.getElementById('resultat');
            
            // Validation de la saisie
            const n = parseInt(inputNb);
            if (isNaN(n) || n <= 0) {
                divResultat.style.display = "block";
                divResultat.style.innerHTML = "<span style='color: red;'>Veuillez entrer un nombre entier supérieur à 0.</span>";
                return;
            }

            // Génération et affichage du résultat
            const resultatSuite = genererFibonacci(n);
            divResultat.style.display = "block";
            divResultat.innerHTML = `<strong>Résultat (${n} termes) :</strong><br>${resultatSuite.join(', ')}`;
        }

        // Fonction liée au bouton d'effacement
        function effacerFormulaire() {
            document.getElementById('terms').value = '';
            const divResultat = document.getElementById('resultat');
            divResultat.innerHTML = '';
            divResultat.style.display = "none";
        }
    </script>

</body>
</html>
